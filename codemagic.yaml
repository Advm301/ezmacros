workflows:
  ios-workflow:
    name: QuickPrep iOS Workflow
    max_build_duration: 60
    integrations:
      app_store_connect: quickprep_key
    environment:
      vars:
        BUNDLE_ID: "com.adamcmcewen.quickprep"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: latest
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web app and sync Capacitor iOS project
        script: npm run ios:sync
      - name: Set up keychain to be used for code signing
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true